<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Fly Select — Membership Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08080A;
      font-family: 'Cormorant Garamond', serif;
    }

    .scene {
      perspective: 1400px;
      width: 100%;
      max-width: 520px;
      padding: 0 2rem;
    }

    .card {
      width: 100%;
      aspect-ratio: 85.6 / 53.98;
      border-radius: 18px;
      position: relative;
      transform: rotateX(6deg) rotateY(-8deg);
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      box-shadow:
        0 50px 100px rgba(0,0,0,0.85),
        0 20px 40px rgba(0,0,0,0.5),
        0 0 0 0.5px rgba(201,168,76,0.35),
        inset 0 0 80px rgba(201,168,76,0.03);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(145deg, #1C1C20 0%, #0C0C0F 45%, #161619 100%);
      overflow: hidden;
    }

    .card-face::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 5%, rgba(201,168,76,0.4) 25%, rgba(232,201,106,1) 50%, rgba(201,168,76,0.4) 75%, transparent 95%);
      z-index: 10;
    }

    .card-face::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0.5px;
      background: linear-gradient(90deg, transparent 10%, rgba(201,168,76,0.2) 40%, rgba(201,168,76,0.35) 50%, rgba(201,168,76,0.2) 60%, transparent 90%);
      z-index: 10;
    }

    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg,
        transparent 25%,
        rgba(201,168,76,0.04) 42%,
        rgba(232,201,106,0.1) 50%,
        rgba(201,168,76,0.04) 58%,
        transparent 75%
      );
      animation: shimmer 5s ease-in-out infinite;
      border-radius: 18px;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.5; transform: translateX(-15px) skewX(-5deg); }
      50% { opacity: 1; transform: translateX(15px) skewX(-5deg); }
    }

    .geo {
      position: absolute;
      border-style: solid;
      border-color: rgba(201,168,76,0.1);
      border-radius: 50%;
      right: -50px;
      bottom: -50px;
    }

    .lines {
      position: absolute;
      top: 0; left: 0;
      width: 45%;
      height: 100%;
      background-image: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(201,168,76,0.025) 18px,
        rgba(201,168,76,0.025) 18.5px
      );
    }

    .card-content {
      position: absolute;
      inset: 0;
      padding: 7% 8%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo-block { display: flex; flex-direction: column; gap: 3px; }

    .club-label {
      font-size: clamp(7px, 1.3vw, 9px);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      font-weight: 400;
    }

    .fly-select {
      font-size: clamp(20px, 4.2vw, 30px);
      font-weight: 300;
      letter-spacing: 0.22em;
      color: #E8C96A;
      line-height: 1;
      text-transform: uppercase;
    }


    .brand-logo {
      height: clamp(42px, 8vw, 56px);
      width: auto;
      object-fit: contain;
      border-radius: 50%;
      border: 0.5px solid rgba(201,168,76,0.45);
      box-shadow: 0 0 14px rgba(201,168,76,0.18);
      display: block;
    }

    .plane { opacity: 0.65; margin-top: 2px; }

    .mid { display: flex; align-items: center; gap: 4%; }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .name-block { display: flex; flex-direction: column; gap: 3px; }

    .name-label {
      font-size: clamp(6px, 1vw, 8px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.35);
    }

    .name-val {
      font-size: clamp(11px, 2.3vw, 16px);
      font-weight: 600;
      letter-spacing: 0.18em;
      color: #E8C96A;
      text-transform: uppercase;
    }

    .right-bottom { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .tier {
      font-size: clamp(6px, 1vw, 8px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.45);
      border: 0.5px solid rgba(201,168,76,0.2);
      padding: 2px 9px 2px 10px;
      border-radius: 2px;
    }

    .exp-row { display: flex; gap: 14px; }

    .exp-f { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }

    .exp-lbl {
      font-size: clamp(5px, 0.85vw, 7px);
      letter-spacing: 0.35em;
      color: rgba(201,168,76,0.3);
      text-transform: uppercase;
    }

    .exp-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1.8vw, 13px);
      color: rgba(201,168,76,0.65);
      letter-spacing: 0.08em;
    }

    .card-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 2.2vw, 15px);
      letter-spacing: 0.2em;
      color: rgba(201,168,76,0.6);
      display: flex;
      gap: 1.4em;
    }
  </style>
</head>

  <script>
    const card = document.getElementById('card');
    const scene = card.parentElement;

    scene.addEventListener('mousemove', e => {
      const r = scene.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = `rotateX(${-y * 16}deg) rotateY(${x * 20}deg) translateY(-6px)`;
    });

    scene.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(6deg) rotateY(-8deg)';
    });

    // Touch support
    scene.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const r = scene.getBoundingClientRect();
      const x = (touch.clientX - r.left) / r.width - 0.5;
      const y = (touch.clientY - r.top) / r.height - 0.5;
      card.style.transform = `rotateX(${-y * 16}deg) rotateY(${x * 20}deg) translateY(-6px)`;
    }, { passive: false });

    scene.addEventListener('touchend', () => {
      card.style.transform = 'rotateX(6deg) rotateY(-8deg)';
    });
  </script>
